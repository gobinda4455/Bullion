<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>$BULL Tap-to-Earn</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #app {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        /* Maintenance Overlay */
        #maintenance-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: black;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }

        #maintenance-overlay.active {
            display: flex;
        }

        .maintenance-text {
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-align: center;
        }

        .maintenance-subtext {
            font-size: 16px;
            color: #888;
            text-align: center;
            padding: 0 20px;
        }

        /* Header */
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .balance {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .balance::before {
            content: '💰';
            margin-right: 5px;
        }

        .user-id {
            font-size: 12px;
            opacity: 0.7;
        }

        /* Main Content Area */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* Home Tab */
        .home-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .tap-area {
            text-align: center;
        }

        .tap-image {
            width: 200px;
            height: 200px;
            cursor: pointer;
            transition: transform 0.1s ease;
            animation: float 3s ease-in-out infinite;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .tap-image:active {
            transform: scale(0.95);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .tap-stats {
            text-align: center;
        }

        .tap-count {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .tap-multiplier {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
        }

        /* Tasks & Refer Tab */
        .tasks-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .referral-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
        }

        .referral-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .referral-link {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            word-break: break-all;
            font-size: 12px;
        }

        .copy-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
            white-space: nowrap;
        }

        .referral-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }

        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .task-item.locked {
            opacity: 0.5;
            pointer-events: none;
        }

        .task-lock {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 18px;
        }

        .task-info {
            flex: 1;
        }

        .task-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .task-reward {
            font-size: 14px;
            color: #FFD700;
        }

        .task-action {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .task-action.completed {
            background: #808080;
            cursor: not-allowed;
        }

        /* Withdraw Tab */
        .withdraw-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .withdraw-section.locked {
            opacity: 0.5;
            pointer-events: none;
            position: relative;
        }

        .withdraw-section.locked::before {
            content: '🔒';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            z-index: 10;
        }

        .balance-info {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .balance-amount {
            font-size: 36px;
            font-weight: bold;
            margin: 10px 0;
        }

        .min-withdraw {
            font-size: 14px;
            opacity: 0.7;
        }

        .withdraw-form {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 16px;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .withdraw-btn {
            width: 100%;
            padding: 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .withdraw-btn:hover {
            background: #45a049;
        }

        .withdraw-btn:disabled {
            background: #808080;
            cursor: not-allowed;
        }

        /* Bottom Navigation */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .nav-item.active {
            opacity: 1;
        }

        .nav-item.locked {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .nav-icon {
            font-size: 24px;
        }

        .nav-label {
            font-size: 12px;
        }

        /* Notifications */
        .notification {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translate(-50%, 20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            font-size: 18px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Maintenance Overlay -->
        <div id="maintenance-overlay">
            <div class="maintenance-text">🚧 Coming Soon</div>
            <div class="maintenance-subtext">$BULL Tap-to-Earn is under maintenance. Please check back later!</div>
        </div>

        <!-- Header -->
        <div class="header">
            <div class="user-id" id="userId"></div>
            <div class="balance" id="balance">0 $BULL</div>
        </div>

        <!-- Main Content -->
        <div class="content" id="content">
            <!-- Home Section -->
            <div id="homeSection" class="home-section">
                <div class="tap-area">
                    <img src="https://i.ibb.co/SXnS7ftK/logo-imresizer.png" 
                         alt="Tap to earn" 
                         class="tap-image" 
                         id="tapImage"
                         onclick="handleTap()">
                </div>
                <div class="tap-stats">
                    <div class="tap-count" id="tapCount">0</div>
                    <div class="tap-multiplier">⚡ 1 $BULL per tap</div>
                </div>
            </div>

            <!-- Tasks Section -->
            <div id="tasksSection" class="tasks-section hidden">
                <div class="referral-box">
                    <div class="referral-title">🔗 Your Referral Link</div>
                    <div style="display: flex; align-items: center;">
                        <div class="referral-link" id="referralLink">Loading...</div>
                        <button class="copy-btn" onclick="copyReferralLink()">Copy</button>
                    </div>
                    <div class="referral-stats">
                        <div class="stat-item">
                            <div class="stat-value" id="referralCount">0</div>
                            <div class="stat-label">Referrals</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="referralEarnings">0</div>
                            <div class="stat-label">Earned</div>
                        </div>
                    </div>
                </div>

                <div class="tasks-list" id="tasksList">
                    <!-- Tasks will be dynamically added here -->
                </div>
            </div>

            <!-- Withdraw Section -->
            <div id="withdrawSection" class="withdraw-section hidden">
                <div class="balance-info">
                    <div>Available Balance</div>
                    <div class="balance-amount" id="withdrawBalance">0 $BULL</div>
                    <div class="min-withdraw">Minimum withdrawal: 1000 $BULL</div>
                </div>

                <div class="withdraw-form">
                    <div class="form-group">
                        <label>Amount ($BULL)</label>
                        <input type="number" id="withdrawAmount" placeholder="Enter amount" min="1000">
                    </div>
                    <div class="form-group">
                        <label>TON Wallet Address</label>
                        <input type="text" id="walletAddress" placeholder="Enter your TON wallet address">
                    </div>
                    <button class="withdraw-btn" onclick="requestWithdrawal()" id="withdrawBtn">Request Withdrawal</button>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('home')" id="navHome">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Home</span>
            </div>
            <div class="nav-item" onclick="switchTab('tasks')" id="navTasks">
                <span class="nav-icon">📋</span>
                <span class="nav-label">Tasks & Refer</span>
            </div>
            <div class="nav-item" onclick="switchTab('withdraw')" id="navWithdraw">
                <span class="nav-icon">💸</span>
                <span class="nav-label">Withdraw</span>
            </div>
        </div>
    </div>

    <script>
        // Initialize Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // Get user data from URL
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user_id');

        // Game state
        let coins = 0;
        let tasks = [];
        let completedTasks = [];
        let referralLink = '';
        let lockedFeatures = {
            withdraw: false,
            tasks: false,
            game: false
        };
        let maintenanceMode = false;
        let isBanned = false;

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('userId').textContent = `ID: ${userId || 'Unknown'}`;
            loadUserData();
        });

        // Load user data from bot
        function loadUserData() {
            showNotification('Loading data...');
            
            // Send request to bot for user data
            tg.sendData(JSON.stringify({
                type: 'get_user_data',
                user_id: userId
            }));

            // For demo purposes, simulate data load
            setTimeout(() => {
                // This would normally come from the bot
                // Simulating data for now
                coins = Math.floor(Math.random() * 5000);
                tasks = [
                    { id: 'task1', name: 'Join Telegram Channel', reward: 100, link: 'https://t.me/yourchannel' },
                    { id: 'task2', name: 'Follow on Twitter', reward: 100, link: 'https://twitter.com/youraccount' },
                    { id: 'task3', name: 'Subscribe to YouTube', reward: 200, link: 'https://youtube.com/yourchannel' }
                ];
                completedTasks = [];
                referralLink = `https://t.me/YourBot?start=${userId}`;
                
                updateUI();
                hideNotification();
            }, 1000);
        }

        // Update UI with current state
        function updateUI() {
            // Update balances
            document.getElementById('balance').textContent = `${coins} $BULL`;
            document.getElementById('tapCount').textContent = `${coins} $BULL`;
            document.getElementById('withdrawBalance').textContent = `${coins} $BULL`;
            document.getElementById('referralLink').textContent = referralLink;

            // Update tasks list
            const tasksList = document.getElementById('tasksList');
            tasksList.innerHTML = '';
            
            tasks.forEach(task => {
                const isCompleted = completedTasks.includes(task.id);
                const isLocked = lockedFeatures.tasks;
                
                const taskElement = document.createElement('div');
                taskElement.className = `task-item ${isLocked ? 'locked' : ''}`;
                taskElement.innerHTML = `
                    ${isLocked ? '<span class="task-lock">🔒</span>' : ''}
                    <div class="task-info">
                        <div class="task-name">${task.name}</div>
                        <div class="task-reward">+${task.reward} $BULL</div>
                    </div>
                    <button class="task-action ${isCompleted ? 'completed' : ''}" 
                            onclick="completeTask('${task.id}', ${task.reward})"
                            ${isCompleted || isLocked ? 'disabled' : ''}>
                        ${isCompleted ? '✓ Completed' : 'Start'}
                    </button>
                `;
                tasksList.appendChild(taskElement);
            });

            // Update lock status on navigation
            updateNavLocks();

            // Check maintenance mode
            if (maintenanceMode) {
                document.getElementById('maintenance-overlay').classList.add('active');
            } else {
                document.getElementById('maintenance-overlay').classList.remove('active');
            }

            // Check if banned
            if (isBanned) {
                showNotification('⛔ You are banned from this game!', 5000);
                setTimeout(() => {
                    tg.close();
                }, 3000);
            }
        }

        // Update navigation locks
        function updateNavLocks() {
            const navHome = document.getElementById('navHome');
            const navTasks = document.getElementById('navTasks');
            const navWithdraw = document.getElementById('navWithdraw');

            if (lockedFeatures.game) {
                navHome.classList.add('locked');
            } else {
                navHome.classList.remove('locked');
            }

            if (lockedFeatures.tasks) {
                navTasks.classList.add('locked');
            } else {
                navTasks.classList.remove('locked');
            }

            if (lockedFeatures.withdraw) {
                navWithdraw.classList.add('locked');
            } else {
                navWithdraw.classList.remove('locked');
            }
        }

        // Handle tap
        function handleTap() {
            if (lockedFeatures.game || maintenanceMode || isBanned) {
                showNotification('🔒 Game is currently locked!');
                return;
            }

            coins += 1;
            updateUI();
            
            // Send update to bot
            tg.sendData(JSON.stringify({
                type: 'update_coins',
                coins: coins
            }));

            // Visual feedback
            const img = document.getElementById('tapImage');
            img.style.transform = 'scale(0.9)';
            setTimeout(() => {
                img.style.transform = 'scale(1)';
            }, 100);
        }

        // Switch tabs
        function switchTab(tab) {
            if (maintenanceMode || isBanned) {
                showNotification('🔒 Game is under maintenance!');
                return;
            }

            // Check if tab is locked
            if (tab === 'tasks' && lockedFeatures.tasks) {
                showNotification('🔒 Tasks section is locked!');
                return;
            }
            if (tab === 'withdraw' && lockedFeatures.withdraw) {
                showNotification('🔒 Withdraw section is locked!');
                return;
            }
            if (tab === 'home' && lockedFeatures.game) {
                showNotification('🔒 Game is locked!');
                return;
            }

            // Hide all sections
            document.getElementById('homeSection').classList.add('hidden');
            document.getElementById('tasksSection').classList.add('hidden');
            document.getElementById('withdrawSection').classList.add('hidden');

            // Show selected section
            document.getElementById(`${tab}Section`).classList.remove('hidden');

            // Update navigation active state
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            document.getElementById(`nav${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
        }

        // Copy referral link
        function copyReferralLink() {
            navigator.clipboard.writeText(referralLink).then(() => {
                showNotification('✅ Referral link copied!');
            }).catch(() => {
                showNotification('❌ Failed to copy link');
            });
        }

        // Complete task
        function completeTask(taskId, reward) {
            if (lockedFeatures.tasks || maintenanceMode || isBanned) {
                showNotification('🔒 Tasks are currently locked!');
                return;
            }

            // Open task link
            const task = tasks.find(t => t.id === taskId);
            if (task && task.link) {
                window.open(task.link, '_blank');
            }

            // Mark as completed
            completedTasks.push(taskId);
            coins += reward;
            
            updateUI();

            // Send to bot
            tg.sendData(JSON.stringify({
                type: 'task_completed',
                task_id: taskId,
                reward: reward
            }));

            showNotification(`✅ Task completed! +${reward} $BULL`);
        }

        // Request withdrawal
        function requestWithdrawal() {
            if (lockedFeatures.withdraw || maintenanceMode || isBanned) {
                showNotification('🔒 Withdrawals are currently locked!');
                return;
            }

            const amount = parseInt(document.getElementById('withdrawAmount').value);
            const address = document.getElementById('walletAddress').value;

            if (!amount || amount < 1000) {
                showNotification('❌ Minimum withdrawal is 1000 $BULL');
                return;
            }

            if (!address) {
                showNotification('❌ Please enter your TON wallet address');
                return;
            }

            if (amount > coins) {
                showNotification('❌ Insufficient balance');
                return;
            }

            // Send withdrawal request to bot
            tg.sendData(JSON.stringify({
                type: 'withdrawal_request',
                amount: amount,
                address: address
            }));

            showNotification('✅ Withdrawal request sent!');
            
            // Clear form
            document.getElementById('withdrawAmount').value = '';
            document.getElementById('walletAddress').value = '';
        }

        // Show notification
        function showNotification(message, duration = 2000) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            
            document.getElementById('app').appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, duration);
        }

        function hideNotification() {
            const notifications = document.querySelectorAll('.notification');
            notifications.forEach(n => n.remove());
        }

        // Handle incoming data from bot (would be via Telegram.WebApp.onEvent)
        tg.onEvent('mainButtonClicked', function() {
            tg.sendData(JSON.stringify({
                type: 'sync_data',
                coins: coins,
                completed_tasks: completedTasks
            }));
        });

        // Initialize
        updateUI();
    </script>
</body>
</html>
