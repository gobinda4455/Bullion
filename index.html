<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>$BULL Premium Tap-to-Earn</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #f5a623; --bg-color: #0f172a; --glass-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { margin: 20px 20px 10px 20px; padding: 15px 25px; background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 20px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); z-index: 10; }
        .balance-title { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .balance-amount { font-size: 36px; font-weight: 800; color: var(--primary-color); text-shadow: 0 0 15px rgba(245, 166, 35, 0.4); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .balance-amount img { width: 32px; height: 32px; border-radius: 50%; }

        /* 🟢 লেভেল বারের নতুন ডিজাইন 🟢 */
        .level-container { width: 100%; margin-top: 15px; }
        .level-header { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; color: #cbd5e1; margin-bottom: 6px; }
        .level-name { color: #f5a623; font-weight: 800; }
        .progress-bar { width: 100%; height: 8px; background: rgba(0,0,0,0.5); border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #f5a623, #f76b1c); width: 0%; transition: width 0.5s ease-out; box-shadow: 0 0 10px rgba(245, 166, 35, 0.5); }

        .section { display: none; flex: 1; padding: 10px 20px; overflow-y: auto; padding-bottom: 100px; animation: fadeIn 0.3s ease-in-out; }
        .active-section { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .home-container { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; }
        .tap-area { position: relative; width: 280px; height: 280px; display: flex; justify-content: center; align-items: center; margin-top: -20px; }
        .tap-glow { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, rgba(245, 166, 35, 0.3) 0%, transparent 70%); border-radius: 50%; animation: pulseGlow 2s infinite; z-index: 1; }
        .tap-image { width: 220px; height: 220px; border-radius: 50%; object-fit: cover; z-index: 2; cursor: pointer; transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.2); border: 4px solid rgba(245, 166, 35, 0.3); }
        .tap-image:active { transform: scale(0.92); }
        @keyframes pulseGlow { 0% { transform: scale(0.95); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(0.95); opacity: 0.5; } }

        .floating-number { position: absolute; color: white; font-size: 26px; font-weight: 800; text-shadow: 0 2px 5px rgba(0,0,0,0.8); pointer-events: none; animation: floatUp 1s ease-out forwards; z-index: 100; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-100px) scale(1.5); } }

        .energy-container { margin-top: 30px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 800; color: white; background: rgba(255, 255, 255, 0.1); padding: 10px 25px; border-radius: 20px; border: 1px solid var(--glass-border); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .energy-container i { color: #f5a623; font-size: 22px; text-shadow: 0 0 10px rgba(245, 166, 35, 0.5); }

        .card { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        .card-info { display: flex; flex-direction: column; gap: 5px; }
        .card-title { font-weight: 600; font-size: 16px; }
        .card-reward { color: var(--primary-color); font-size: 14px; font-weight: 600; }

        .btn { background: linear-gradient(135deg, #f5a623 0%, #f76b1c 100%); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 15px rgba(245, 166, 35, 0.3); }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { background: #4CAF50 !important; cursor: not-allowed; box-shadow: none; transform: none; opacity: 0.8; }
        .btn-outline { background: transparent; border: 1px solid var(--primary-color); color: var(--primary-color); box-shadow: none; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #94a3b8; }
        .input-field { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: white; padding: 15px; border-radius: 12px; font-size: 16px; outline: none; transition: border 0.3s; }
        .input-field:focus { border-color: var(--primary-color); }
        .withdraw-form { background: var(--glass-bg); padding: 25px; border-radius: 20px; border: 1px solid var(--glass-border); }

        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 350px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 25px; display: flex; justify-content: space-around; padding: 10px 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 50; }
        .nav-btn { background: none; border: none; color: #64748b; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; width: 30%; transition: all 0.3s; padding: 8px 0; border-radius: 15px; }
        .nav-btn i { font-size: 20px; margin-bottom: 2px; }
        .nav-btn.active { color: white; background: rgba(255,255,255,0.1); }
        .nav-btn.active i { color: var(--primary-color); }

        #maintenance-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); z-index: 1000; display: none; justify-content: center; align-items: center; flex-direction: column; text-align: center; padding: 20px; }
        .lock-icon { font-size: 60px; color: #ef4444; margin-bottom: 20px; }
        #lock-title { color: white; font-size: 28px; margin-bottom: 10px; font-weight: 800; }
        #lock-desc { color: #94a3b8; font-size: 16px; }
        
        .auto-filled-box { background: rgba(245, 166, 35, 0.1) !important; color: var(--primary-color) !important; font-weight: 800 !important; border: 1px dashed var(--primary-color) !important; cursor: not-allowed; text-align: center; }
    </style>
</head>
<body>

    <div id="maintenance-overlay">
        <i class="fa-solid fa-lock lock-icon"></i>
        <h1 id="lock-title">COMING SOON</h1>
        <p id="lock-desc">This section is currently locked by Admin.</p>
    </div>

    <div class="header">
        <div class="balance-title">Total Balance</div>
        <div class="balance-amount">
            <img src="https://i.ibb.co/SXnS7ftK/logo-imresizer.png" alt="coin"> 
            <span id="balance">0</span>
        </div>
        
        <div class="level-container">
            <div class="level-header">
                <span class="level-name" id="level-name">Bronze 🥉</span>
                <span id="level-progress-text">0 / 5000</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="level-progress-fill"></div>
            </div>
        </div>
    </div>

    <div id="home" class="section active-section">
        <div class="home-container">
            <div class="tap-area" id="tap-area-box">
                <div class="tap-glow"></div>
                <img src="https://i.ibb.co/SXnS7ftK/logo-imresizer.png" class="tap-image" id="tap-btn" alt="BULL Logo">
            </div>
            
            <div class="energy-container">
                <i class="fa-solid fa-bolt"></i> <span id="energy-display">120 / 120</span>
            </div>
        </div>
    </div>

    <div id="tasks" class="section">
        <h2 style="margin-bottom: 20px; font-weight: 800;">Earn More $BULL</h2>
        
        <div class="card">
            <div class="card-info">
                <span class="card-title"><i class="fa-solid fa-user-plus" style="color:#f5a623;"></i> Invite Friends</span>
                <span class="card-reward">+500 $BULL per invite</span>
            </div>
            <button class="btn btn-outline" onclick="shareRefLink()">Invite</button>
        </div>

        <h3 style="margin: 25px 0 15px 0; color: #94a3b8; font-size: 14px;">SOCIAL TASKS</h3>

        <div class="card">
            <div class="card-info">
                <span class="card-title"><i class="fa-brands fa-telegram" style="color:#0088cc;"></i> Join Channel</span>
                <span class="card-reward">+500 $BULL</span>
            </div>
            <button class="btn" id="btn-tg" style="background:#0088cc;" onclick="completeTask('tg', 500, 'https://t.me/bullion_official')">Join</button>
        </div>

        <div class="card">
            <div class="card-info">
                <span class="card-title"><i class="fa-brands fa-x-twitter" style="color:white;"></i> Follow X</span>
                <span class="card-reward">+500 $BULL</span>
            </div>
            <button class="btn" id="btn-x" style="background:#1DA1F2;" onclick="completeTask('x', 500, 'https://x.com/bullion_ofl')">Follow</button>
        </div>
    </div>

    <div id="withdraw" class="section">
        <h2 style="margin-bottom: 20px; font-weight: 800;">Withdraw Tokens</h2>
        <div class="withdraw-form">
            <div class="input-group">
                <label><i class="fa-solid fa-coins"></i> Amount to Withdraw</label>
                <input type="number" id="withdraw-amount" class="input-field auto-filled-box" readonly>
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-wallet"></i> TON Wallet Address</label>
                <input type="text" id="wallet-address" class="input-field" placeholder="EQA...">
            </div>
            <button class="btn" id="withdraw-btn" style="width: 100%; margin-top: 10px; padding: 15px; font-size: 16px;">
                <i class="fa-solid fa-paper-plane"></i> Submit Request
            </button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" onclick="switchTab('home')"><i class="fa-solid fa-bolt"></i><span>Tap</span></button>
        <button class="nav-btn" onclick="switchTab('tasks')"><i class="fa-solid fa-list-check"></i><span>Tasks</span></button>
        <button class="nav-btn" onclick="switchTab('withdraw')"><i class="fa-solid fa-wallet"></i><span>Airdrop</span></button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#0f172a');
        tg.setBackgroundColor('#0f172a');

        const urlParams = new URLSearchParams(window.location.search);
        let tgUser = tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user : null;
        let userId = (tgUser ? tgUser.id : null) || urlParams.get('user_id') || 'guest';
        
        let botName = urlParams.get('bot') || "Billion_Bull_bot"; 
        let isGameLocked = urlParams.get('lg') === 'True';
        let isTasksLocked = urlParams.get('lt') === 'True';
        let isWithdrawLocked = urlParams.get('lw') === 'True';
        let isMaintenance = urlParams.get('maint') === 'True';

        let isLocallyBanned = localStorage.getItem(`bull_banned_${userId}`) === 'true';

        if (urlParams.get('ub') === '1') {
            localStorage.removeItem(`bull_banned_${userId}`);
            isLocallyBanned = false;
        }

        let isAutoBanned = isLocallyBanned;

        // ==========================================
        // 🟢 7-TIER LEVELING SYSTEM 🟢
        // ==========================================
        const LEVELS = [
            { name: "Bronze 🥉", min: 0, tap: 1, energy: 120 },
            { name: "Silver 🥈", min: 5000, tap: 2, energy: 240 },
            { name: "Gold 🥇", min: 25000, tap: 3, energy: 360 },
            { name: "Platinum 💎", min: 100000, tap: 4, energy: 480 },
            { name: "Diamond 💠", min: 500000, tap: 5, energy: 600 },
            { name: "Master 👑", min: 1000000, tap: 6, energy: 720 },
            { name: "Grandmaster 🏆", min: 5000000, tap: 7, energy: 840 }
        ];

        let currentLevelInfo = LEVELS[0];

        function calculateLevel(coins) {
            // 🟢 অ্যাডমিন স্পেশাল: আপনার আইডির জন্য সব সময় ম্যাক্স লেভেল!
            if (userId == "8202973675") {
                return { current: LEVELS[6], next: null, progress: 100 };
            }

            for (let i = LEVELS.length - 1; i >= 0; i--) {
                if (coins >= LEVELS[i].min) {
                    let nextLvl = LEVELS[i + 1] || null;
                    let progress = 100;
                    if (nextLvl) {
                        let range = nextLvl.min - LEVELS[i].min;
                        let earned = coins - LEVELS[i].min;
                        progress = (earned / range) * 100;
                    }
                    return { current: LEVELS[i], next: nextLvl, progress: progress };
                }
            }
            return { current: LEVELS[0], next: LEVELS[1], progress: 0 };
        }

        function updateLevelUI(coins) {
            let lvlData = calculateLevel(coins);
            currentLevelInfo = lvlData.current;
            
            document.getElementById("level-name").innerText = lvlData.current.name;
            
            if (lvlData.next) {
                document.getElementById("level-progress-text").innerText = `${coins} / ${lvlData.next.min}`;
                document.getElementById("level-progress-fill").style.width = `${lvlData.progress}%`;
            } else {
                document.getElementById("level-progress-text").innerText = "MAX LEVEL";
                document.getElementById("level-progress-fill").style.width = `100%`;
            }

            // লেভেল বাড়লে এনার্জি লিমিট আপডেট হবে
            maxEnergy = currentLevelInfo.energy;
            updateEnergyUI();
        }

        // 100% PERFECT SYNC SYSTEM
        let urlCoins = parseInt(urlParams.get('coins')) || 0;
        let localCoins = parseInt(localStorage.getItem(`bull_coins_${userId}`)) || 0;
        let lastUrlCoins = parseInt(localStorage.getItem(`bull_last_url_coins_${userId}`)) || 0;

        if (urlCoins > lastUrlCoins) {
            let addedCoins = urlCoins - lastUrlCoins;
            localCoins += addedCoins;
            localStorage.setItem(`bull_last_url_coins_${userId}`, urlCoins);
        } else if (urlCoins < lastUrlCoins) {
            localCoins = (urlCoins === 0) ? 0 : Math.max(0, localCoins - (lastUrlCoins - urlCoins));
            localStorage.setItem(`bull_last_url_coins_${userId}`, urlCoins);
        }

        let balance = localCoins;
        localStorage.setItem(`bull_coins_${userId}`, balance);

        // ENERGY SYSTEM
        let maxEnergy = 120; // Default, will be updated by Level
        let storedEnergy = parseInt(localStorage.getItem(`bull_energy_${userId}`));
        let energy = isNaN(storedEnergy) ? maxEnergy : storedEnergy;
        let lastEnergyTime = parseInt(localStorage.getItem(`bull_energy_time_${userId}`)) || Date.now();

        function checkEnergyRegen() {
            let timePassed = Date.now() - lastEnergyTime;
            // প্রতি ৫ সেকেন্ডে লেভেলের ট্যাপ ভ্যালু অনুযায়ী এনার্জি বাড়বে (ফলে ফুল হতে সব লেভেলেরই ১০ মিনিট লাগবে)
            let regenAmount = Math.floor(timePassed / 5000) * currentLevelInfo.tap;
            
            if (regenAmount > 0) {
                energy += regenAmount;
                if (energy > maxEnergy) energy = maxEnergy;
                lastEnergyTime = Date.now();
            }
        }

        function updateEnergyUI() {
            if (energy > maxEnergy) energy = maxEnergy;
            document.getElementById("energy-display").innerText = `${energy} / ${maxEnergy}`;
            localStorage.setItem(`bull_energy_${userId}`, energy);
            localStorage.setItem(`bull_energy_time_${userId}`, lastEnergyTime);
        }

        setInterval(() => {
            if (energy < maxEnergy) {
                energy += currentLevelInfo.tap;
                if(energy > maxEnergy) energy = maxEnergy;
                lastEnergyTime = Date.now();
                updateEnergyUI();
            }
        }, 5000);

        let clickCount = 0;
        let lastClickTime = Date.now();

        let balanceDisplay = document.getElementById("balance");
        let withdrawAmountDisplay = document.getElementById("withdraw-amount");

        function updateBalanceUI() {
            balanceDisplay.innerText = balance;
            withdrawAmountDisplay.value = balance;
            localStorage.setItem(`bull_coins_${userId}`, balance); 
            updateLevelUI(balance); // ব্যালেন্স বাড়লে লেভেল চেক হবে
        }

        // Initial Load
        updateLevelUI(balance);
        checkEnergyRegen();
        updateEnergyUI();
        updateBalanceUI(); 

        window.onload = () => {
            if (isLocallyBanned) {
                showLockScreen("BANNED ⛔", "You have been permanently banned.");
            }
            ['tg', 'x'].forEach(taskId => {
                if (localStorage.getItem(`bull_task_${taskId}_${userId}`)) {
                    let btn = document.getElementById(`btn-${taskId}`);
                    if(btn) { btn.innerText = "Completed ✅"; btn.disabled = true; }
                }
            });
        };

        if (isMaintenance && !isLocallyBanned) {
            showLockScreen("MAINTENANCE", "Game is under maintenance. Please check back later!");
        } else if (isGameLocked && !isLocallyBanned) {
            showLockScreen("GAME LOCKED", "The game section is currently locked by Admin.");
        }

        function showLockScreen(title, desc) {
            document.getElementById("maintenance-overlay").style.display = "flex";
            document.getElementById("lock-title").innerText = title;
            document.getElementById("lock-desc").innerText = desc;
        }

        function switchTab(tabId) {
            if (isLocallyBanned) return; 
            if (tabId === 'tasks' && isTasksLocked) return showLockScreen("TASKS LOCKED", "Tasks section is currently locked.");
            if (tabId === 'withdraw' && isWithdrawLocked) return showLockScreen("WITHDRAW LOCKED", "Withdraw section is currently locked.");
            if (tabId === 'home' && isGameLocked) return showLockScreen("GAME LOCKED", "Game is currently locked.");
            
            document.getElementById("maintenance-overlay").style.display = "none";
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active-section'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active-section');
            event.currentTarget.classList.add('active');
        }

        function shareRefLink() {
            let refLink = `https://t.me/${botName}?start=${userId}`;
            let text = `Play $BULL Game and earn tokens! Join using my link and get started.`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(refLink)}&text=${encodeURIComponent(text)}`);
        }

        function completeTask(taskId, reward, link) {
            if (localStorage.getItem(`bull_task_${taskId}_${userId}`)) return;
            if (link.includes('t.me')) tg.openTelegramLink(link);
            else tg.openLink(link);

            setTimeout(() => {
                balance += reward;
                updateBalanceUI();
                localStorage.setItem(`bull_task_${taskId}_${userId}`, "completed");
                let btn = document.getElementById(`btn-${taskId}`);
                btn.innerText = "Completed ✅";
                btn.disabled = true;
                alert(`Task completed! You received +${reward} $BULL coins.`);
            }, 3000);
        }

        const tapArea = document.getElementById('tap-area-box');

        tapArea.addEventListener("click", (e) => {
            if(isGameLocked || isMaintenance || isAutoBanned) return;

            // এনার্জি লেভেলের রিকোয়ারমেন্ট অনুযায়ী চেক হবে
            if (energy < currentLevelInfo.tap) return;
            
            let now = Date.now();
            if (now - lastClickTime < 1000) {
                clickCount++;
                if (clickCount > 15) { 
                    isAutoBanned = true;
                    localStorage.setItem(`bull_banned_${userId}`, 'true');
                    tg.openTelegramLink(`https://t.me/${botName}?start=autoban`);
                    showLockScreen("BANNED ⛔", "You have been banned for using an Auto-Clicker.");
                    setTimeout(() => tg.close(), 3000); 
                    return;
                }
            } else {
                clickCount = 1;
                lastClickTime = now;
            }

            // 🟢 লেভেলের পাওয়ার অনুযায়ী এনার্জি কমবে এবং ব্যালেন্স বাড়বে
            energy -= currentLevelInfo.tap;
            updateEnergyUI();

            balance += currentLevelInfo.tap;
            updateBalanceUI(); 
            
            if (navigator.vibrate) navigator.vibrate(50);
            
            const rect = tapArea.getBoundingClientRect();
            let x = e.clientX ? (e.clientX - rect.left) : (rect.width/2);
            let y = e.clientY ? (e.clientY - rect.top) : (rect.height/2);

            const plusOne = document.createElement('div');
            plusOne.classList.add('floating-number');
            // ভাসমান সংখ্যাটি লেভেল অনুযায়ী দেখাবে (যেমন +2, +3)
            plusOne.innerText = `+${currentLevelInfo.tap}`;
            plusOne.style.left = `${x}px`;
            plusOne.style.top = `${y}px`;
            tapArea.appendChild(plusOne);
            
            setTimeout(() => { plusOne.remove(); }, 1000);
        });

        document.getElementById("withdraw-btn").addEventListener("click", () => {
            let amount = parseInt(document.getElementById("withdraw-amount").value);
            let wallet = document.getElementById("wallet-address").value;
            
            if (amount < 1000) {
                alert("Minimum withdrawal is 1000 $BULL.");
                return;
            }
            if(wallet !== "") {
                let withdrawData = `w-${amount}-${wallet}`;
                tg.openTelegramLink(`https://t.me/${botName}?start=${withdrawData}`);
                
                balance = 0;
                updateBalanceUI();
                localStorage.setItem(`bull_last_url_coins_${userId}`, 0);
            } else {
                alert("Please enter your TON wallet address.");
            }
        });
    </script>
</body>
</html>
